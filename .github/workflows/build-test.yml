name: Build Test (Windows VS2026)

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - feature/issue-69-windows-vs2026

jobs:
  build-test:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version-file: .python-version
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build with Nuitka (Windows)
        run: >-
          uv run python -m nuitka gui.py
          --standalone --onefile --enable-plugin=tk-inter
          --output-dir=build -o qr-print-helper
          --windows-console-mode=disable
          --windows-icon-from-ico=assets/icon.ico
          --include-data-files=assets/icon.ico=assets/icon.ico
          --lto=yes --assume-yes-for-downloads

      - name: Build installer (Windows)
        run: |
          Copy-Item RELEASE_README.md build/README.txt
          iscc /F"qr-print-helper-test-installer" assets/installer.iss
        shell: pwsh

      - name: Create zip package (Windows)
        run: |
          New-Item -ItemType Directory -Path staging
          Copy-Item build/qr-print-helper.exe staging/
          Copy-Item RELEASE_README.md staging/README.txt
          Compress-Archive -Path staging/* -DestinationPath "qr-print-helper-test-windows.zip"
        shell: pwsh

      - name: Upload zip artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: qr-print-helper-test-windows
          path: qr-print-helper-test-windows.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: qr-print-helper-test-installer
          path: build/qr-print-helper-test-installer.exe
